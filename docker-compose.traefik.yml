# =============================================================================
# Shared Traefik reverse proxy — runs ONCE on the server, never recreated by
# application deployments.
#
# Bootstrap (one-time, on the server):
#   docker network create traefik-public || true
#   docker compose -f docker-compose.traefik.yml --env-file /path/to/.env up -d
#
# All application stacks connect their services to the external "traefik-public"
# network and carry traefik labels.  Traefik discovers them automatically.
#
# To update Traefik itself:
#   docker compose -f docker-compose.traefik.yml pull
#   docker compose -f docker-compose.traefik.yml up -d
# =============================================================================

services:
  traefik:
    image: traefik:v3.3
    container_name: shared-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket — read-only; required to discover container labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static config (restart required to apply).
      - ./config/traefik/traefik.yml:/traefik.yml:ro
      # Dynamic config (hot-reloaded).
      - ./config/traefik/dynamic:/config/dynamic:ro
      # Let's Encrypt certificate storage (persisted across restarts).
      - traefik_acme:/letsencrypt
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@localservicemarketplace.com}
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  traefik_acme:
    driver: local

networks:
  # External network shared across all stacks on this server.
  # Create it once: docker network create traefik-public
  traefik-public:
    external: true
