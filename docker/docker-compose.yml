version: "3.9"

services:

postgres:
image: postgres:16
container_name: marketplace-postgres
restart: always
environment:
POSTGRES_USER: postgres
POSTGRES_PASSWORD: postgres
POSTGRES_DB: marketplace
ports:
- "5432:5432"
volumes:
- postgres_data:/var/lib/postgresql/data

redis:
image: redis:7
container_name: marketplace-redis
ports:
- "6379:6379"

api-gateway:
image: nginx:latest
container_name: marketplace-gateway
ports:
- "8080:80"
volumes:
- ./gateway/nginx.conf:/etc/nginx/nginx.conf

auth-service:
build: ../services/auth-service
container_name: auth-service
ports:
- "4001:3000"
depends_on:
- postgres

user-service:
build: ../services/user-service
container_name: user-service
ports:
- "4002:3000"
depends_on:
- postgres

request-service:
build: ../services/request-service
container_name: request-service
ports:
- "4003:3000"
depends_on:
- postgres

proposal-service:
build: ../services/proposal-service
container_name: proposal-service
ports:
- "4004:3000"
depends_on:
- postgres

job-service:
build: ../services/job-service
container_name: job-service
ports:
- "4005:3000"
depends_on:
- postgres

payment-service:
build: ../services/payment-service
container_name: payment-service
ports:
- "4006:3000"
depends_on:
- postgres

notification-service:
build: ../services/notification-service
container_name: notification-service
ports:
- "4007:3000"
depends_on:
- postgres

worker-service:
build: ../workers/background-worker
container_name: worker-service
depends_on:
- redis
- postgres

volumes:
postgres_data:
