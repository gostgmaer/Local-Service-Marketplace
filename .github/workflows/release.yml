name: Release - Auto Tag & Production Deploy

on:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  auto-tag:
    name: Auto - Generate Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,master
          tag_prefix: v
          custom_release_rules: "major:major,feat:minor,fix:patch,chore:patch,refactor:patch,perf:patch,style:patch,docs:patch,test:patch,build:patch,ci:patch"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.new_tag != ''
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: false