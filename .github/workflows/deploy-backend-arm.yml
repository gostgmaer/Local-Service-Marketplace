name: Build And Deploy Backend To ARM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  build-and-push-images:
    name: Build And Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            context: services/identity-service
          - service: marketplace-service
            context: services/marketplace-service
          - service: payment-service
            context: services/payment-service
          - service: comms-service
            context: services/comms-service
          - service: oversight-service
            context: services/oversight-service
          - service: api-gateway
            context: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lsmp-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/lsmp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend (Skip Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-and-push-images]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OCI_HOST }}" || { echo "Missing secret: OCI_HOST"; exit 1; }
          test -n "${{ secrets.OCI_USER }}" || { echo "Missing secret: OCI_USER"; exit 1; }
          test -n "${{ secrets.OCI_SSH_PRIVATE_KEY }}" || { echo "Missing secret: OCI_SSH_PRIVATE_KEY"; exit 1; }
          test -n "${{ secrets.GHCR_USERNAME }}" || { echo "Missing secret: GHCR_USERNAME"; exit 1; }
          test -n "${{ secrets.GHCR_TOKEN }}" || { echo "Missing secret: GHCR_TOKEN"; exit 1; }

      - name: Create release archive (tracked files only)
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output artifacts/release.tgz HEAD
          ls -lh artifacts/release.tgz

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          source: artifacts/release.tgz
          strip_components: 1
          target: /home/${{ secrets.OCI_USER }}/
          overwrite: true

      - name: Deploy on ARM server (pull images, no build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          script_stop: true
          command_timeout: 80m
          script: |
            set -Eeuo pipefail

            APP_DIR="/home/${{ secrets.OCI_USER }}/Local-Service-Marketplace"
            STAGE_DIR="/home/${{ secrets.OCI_USER }}/Local-Service-Marketplace.stage-${{ github.run_id }}-${{ github.run_attempt }}"
            BACKUP_DIR="/home/${{ secrets.OCI_USER }}/Local-Service-Marketplace.backup-${{ github.run_id }}-${{ github.run_attempt }}"
            ARCHIVE_PRIMARY="/home/${{ secrets.OCI_USER }}/release.tgz"
            ARCHIVE_FALLBACK="/home/${{ secrets.OCI_USER }}/artifacts/release.tgz"
            OWNER="${{ github.repository_owner }}"

            if [ -f "$ARCHIVE_PRIMARY" ]; then
              ARCHIVE="$ARCHIVE_PRIMARY"
            elif [ -f "$ARCHIVE_FALLBACK" ]; then
              ARCHIVE="$ARCHIVE_FALLBACK"
            else
              echo "Release archive not found. Checked:"
              echo " - $ARCHIVE_PRIMARY"
              echo " - $ARCHIVE_FALLBACK"
              exit 1
            fi

            rm -rf "$STAGE_DIR"
            mkdir -p "$STAGE_DIR"
            tar -xzf "$ARCHIVE" -C "$STAGE_DIR"

            # Keep server runtime configuration intact across deployments.
            if [ -f "$APP_DIR/.env" ]; then cp "$APP_DIR/.env" "$STAGE_DIR/.env"; fi
            if [ -f "$APP_DIR/docker.env" ]; then cp "$APP_DIR/docker.env" "$STAGE_DIR/docker.env"; fi

            ROLLBACK=0
            if [ -d "$APP_DIR" ]; then
              rm -rf "$BACKUP_DIR"
              mv "$APP_DIR" "$BACKUP_DIR"
              ROLLBACK=1
            fi

            mv "$STAGE_DIR" "$APP_DIR"
            cd "$APP_DIR"

            chmod +x scripts/deploy-production-worker.sh

            if [ ! -f ".env" ]; then
              echo "Missing .env on server. Add /home/${{ secrets.OCI_USER }}/Local-Service-Marketplace/.env and rerun."
              exit 1
            fi

            deploy_with_pulled_images() {
              echo "Logging in to GHCR and pulling latest backend images..."
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

              for svc in identity-service marketplace-service payment-service comms-service oversight-service api-gateway; do
                docker pull "ghcr.io/${OWNER}/lsmp-${svc}:latest"
                docker tag "ghcr.io/${OWNER}/lsmp-${svc}:latest" "lsmp-${svc}:latest"
              done

              # Uses explicit backend service list in deploy script; frontend is not deployed.
              ./scripts/deploy-production-worker.sh --env-file .env --no-build
            }

            if ! deploy_with_pulled_images; then
              if [ "$ROLLBACK" -eq 1 ] && [ -d "$BACKUP_DIR" ]; then
                echo "Deployment failed. Rolling back application directory..."
                rm -rf "$APP_DIR"
                mv "$BACKUP_DIR" "$APP_DIR"
              fi
              exit 1
            fi

            docker logout ghcr.io || true
            rm -f "$ARCHIVE_PRIMARY" "$ARCHIVE_FALLBACK"

            docker compose --env-file .env -f docker-compose.yml -f docker-compose.level3.yml ps
            curl -fsS http://127.0.0.1:3700/health >/dev/null
            echo "Backend deployment completed successfully."

      - name: Verify public health endpoints
        run: |
          set -Eeuo pipefail

          check_endpoint() {
            endpoint="$1"
            for attempt in 1 2 3 4 5; do
              if curl -fsS "$endpoint" >/dev/null; then
                echo "Healthy: $endpoint"
                return 0
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Unhealthy after retries: $endpoint"
                return 1
              fi

              echo "Attempt $attempt failed for $endpoint, retrying in 10 seconds..."
              sleep 10
            done
          }

          check_endpoint "https://lsp-api.easydev.in/health"
          check_endpoint "https://lsp-api.easydev.in/api/v1/health"

          echo "Public health verification passed."
