name: Build And Deploy Backend To ARM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_APP_DIR_NAME: ${{ vars.DEPLOY_APP_DIR_NAME || 'Local-Service-Marketplace' }}
  DEPLOY_NGINX_CONF_NAME: ${{ vars.DEPLOY_NGINX_CONF_NAME || 'lsp-api.easydev.in.conf' }}
  DEPLOY_PUBLIC_API_BASE_URL: ${{ vars.DEPLOY_PUBLIC_API_BASE_URL || 'https://lsp-api.easydev.in' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  build-and-push-images:
    name: Build And Push (${{ matrix.service }})
    # Native ARM64 runner — avoids QEMU SIGILL (Illegal instruction) crashes
    # that occur when emulating ARM64 on x86 during `pnpm install`.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            context: services/identity-service
          - service: marketplace-service
            context: services/marketplace-service
          - service: payment-service
            context: services/payment-service
          - service: comms-service
            context: services/comms-service
          - service: oversight-service
            context: services/oversight-service
          - service: api-gateway
            context: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lsmp-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/lsmp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend (Skip Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-and-push-images]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OCI_HOST }}" || { echo "Missing secret: OCI_HOST"; exit 1; }
          test -n "${{ secrets.OCI_USER }}" || { echo "Missing secret: OCI_USER"; exit 1; }
          test -n "${{ secrets.OCI_SSH_PRIVATE_KEY }}" || { echo "Missing secret: OCI_SSH_PRIVATE_KEY"; exit 1; }
          test -n "${{ secrets.GHCR_USERNAME }}" || { echo "Missing secret: GHCR_USERNAME"; exit 1; }
          test -n "${{ secrets.GHCR_TOKEN }}" || { echo "Missing secret: GHCR_TOKEN"; exit 1; }

      - name: Create release archive (tracked files only)
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output artifacts/release.tgz HEAD
          ls -lh artifacts/release.tgz

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          source: artifacts/release.tgz
          strip_components: 1
          target: /home/${{ secrets.OCI_USER }}/
          overwrite: true

      - name: Deploy on ARM server (pull images, no build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          script_stop: true
          command_timeout: 80m
          script: |
            set -Eeuo pipefail

            APP_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}"
            STAGE_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.stage-${{ github.run_id }}-${{ github.run_attempt }}"
            BACKUP_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.backup-${{ github.run_id }}-${{ github.run_attempt }}"
            ARCHIVE_PRIMARY="/home/${{ secrets.OCI_USER }}/release.tgz"
            ARCHIVE_FALLBACK="/home/${{ secrets.OCI_USER }}/artifacts/release.tgz"
            OWNER="${{ github.repository_owner }}"

            if [ -f "$ARCHIVE_PRIMARY" ]; then
              ARCHIVE="$ARCHIVE_PRIMARY"
            elif [ -f "$ARCHIVE_FALLBACK" ]; then
              ARCHIVE="$ARCHIVE_FALLBACK"
            else
              echo "Release archive not found. Checked:"
              echo " - $ARCHIVE_PRIMARY"
              echo " - $ARCHIVE_FALLBACK"
              exit 1
            fi

            rm -rf "$STAGE_DIR"
            mkdir -p "$STAGE_DIR"
            tar -xzf "$ARCHIVE" -C "$STAGE_DIR"

            # Keep server runtime configuration intact across deployments.
            if [ -f "$APP_DIR/.env" ]; then cp "$APP_DIR/.env" "$STAGE_DIR/.env"; fi
            if [ -f "$APP_DIR/docker.env" ]; then cp "$APP_DIR/docker.env" "$STAGE_DIR/docker.env"; fi

            ROLLBACK=0
            if [ -d "$APP_DIR" ]; then
              rm -rf "$BACKUP_DIR"
              mv "$APP_DIR" "$BACKUP_DIR"
              ROLLBACK=1
            fi

            mv "$STAGE_DIR" "$APP_DIR"
            cd "$APP_DIR"

            chmod +x scripts/deploy-production-worker.sh

            if [ ! -f ".env" ]; then
              echo "Missing .env on server. Add $APP_DIR/.env and rerun."
              exit 1
            fi

            deploy_with_pulled_images() {
              echo "Logging in to GHCR and pulling latest backend images..."
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

              for svc in identity-service marketplace-service payment-service comms-service oversight-service api-gateway; do
                docker pull "ghcr.io/${OWNER}/lsmp-${svc}:latest"
                docker tag "ghcr.io/${OWNER}/lsmp-${svc}:latest" "lsmp-${svc}:latest"
              done

              # Uses explicit backend service list in deploy script; frontend is not deployed.
              ./scripts/deploy-production-worker.sh --env-file .env --no-build
            }

            apply_runtime_limits() {
              echo "Applying fixed production CPU/RAM limits to running containers..."

              docker update --cpus 0.20 --memory 512m --memory-swap 512m api-gateway
              docker update --cpus 0.30 --memory 768m --memory-swap 768m marketplace-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m payment-service
              docker update --cpus 0.25 --memory 768m --memory-swap 768m identity-service
              docker update --cpus 0.15 --memory 768m --memory-swap 768m comms-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m oversight-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m marketplace-redis
              docker update --cpus 0.40 --memory 1536m --memory-swap 1536m marketplace-postgres

              echo "Runtime limits applied."
              docker ps --format '{{.Names}}' | xargs -I{} docker inspect --format 'name={{.Name}}|nano_cpus={{.HostConfig.NanoCpus}}|mem_limit_bytes={{.HostConfig.Memory}}|memswap_limit_bytes={{.HostConfig.MemorySwap}}' {}
            }

            deploy_nginx_config() {
              NGINX_SOURCE_CONF="$APP_DIR/config/nginx/${{ env.DEPLOY_NGINX_CONF_NAME }}"
              NGINX_TARGET_CONF="/etc/nginx/conf.d/${{ env.DEPLOY_NGINX_CONF_NAME }}"
              NGINX_BACKUP_CONF="${NGINX_TARGET_CONF}.bak-${{ github.run_id }}-${{ github.run_attempt }}"

              if [ ! -f "$NGINX_SOURCE_CONF" ]; then
                echo "Nginx config file not found in repo, skipping nginx update: $NGINX_SOURCE_CONF"
                return 0
              fi

              if [ "$(id -u)" -eq 0 ]; then
                SUDO=""
              elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                SUDO="sudo"
              else
                echo "Cannot update nginx automatically: passwordless sudo required for user ${{ secrets.OCI_USER }}"
                return 1
              fi

              if [ -f "$NGINX_TARGET_CONF" ]; then
                $SUDO cp "$NGINX_TARGET_CONF" "$NGINX_BACKUP_CONF"
              fi

              # Install with explicit mode/ownership so nginx can read it.
              $SUDO install -m 0644 "$NGINX_SOURCE_CONF" "$NGINX_TARGET_CONF"
              $SUDO chown root:root "$NGINX_TARGET_CONF"

              # On SELinux-enforcing hosts (Oracle Linux/CentOS/RHEL), copied files
              # can inherit non-nginx-readable labels; normalize context before test.
              if command -v restorecon >/dev/null 2>&1; then
                $SUDO restorecon -v "$NGINX_TARGET_CONF" || true
              fi

              if ! $SUDO nginx -t; then
                echo "Nginx config test failed. Restoring previous config..."
                if [ -f "$NGINX_BACKUP_CONF" ]; then
                  $SUDO install -m 0644 "$NGINX_BACKUP_CONF" "$NGINX_TARGET_CONF"
                  $SUDO chown root:root "$NGINX_TARGET_CONF"
                  if command -v restorecon >/dev/null 2>&1; then
                    $SUDO restorecon -v "$NGINX_TARGET_CONF" || true
                  fi
                fi
                $SUDO nginx -t || true
                return 1
              fi

              if command -v systemctl >/dev/null 2>&1; then
                # systemctl is-active returns 3 when inactive; capture it explicitly
                # instead of letting errexit terminate the deploy script.
                active_rc=0
                $SUDO systemctl is-active --quiet nginx || active_rc=$?

                if [ "$active_rc" -eq 0 ]; then
                  if ! $SUDO systemctl reload nginx; then
                    echo "Nginx reload failed. Attempting restart..."
                    if ! $SUDO systemctl restart nginx; then
                      echo "Nginx restart failed. Attempting start..."
                      if ! $SUDO systemctl start nginx; then
                        $SUDO systemctl --no-pager --full status nginx || true
                        $SUDO journalctl -u nginx --no-pager -n 80 || true
                        return 1
                      fi
                    fi
                  fi
                else
                  echo "Nginx service is not active (systemctl is-active rc=$active_rc). Attempting start..."
                  if ! $SUDO systemctl start nginx; then
                    $SUDO systemctl --no-pager --full status nginx || true
                    $SUDO journalctl -u nginx --no-pager -n 80 || true
                    return 1
                  fi
                fi

                verify_rc=0
                $SUDO systemctl is-active --quiet nginx || verify_rc=$?
                if [ "$verify_rc" -ne 0 ]; then
                  echo "Nginx is not active after reload/start (rc=$verify_rc)."
                  $SUDO systemctl --no-pager --full status nginx || true
                  $SUDO journalctl -u nginx --no-pager -n 80 || true
                  return 1
                fi
              else
                if ! $SUDO nginx -s reload; then
                  echo "Nginx reload signal failed. Attempting fresh start..."
                  if ! $SUDO nginx; then
                    return 1
                  fi
                fi
              fi

              echo "Nginx config deployed and reloaded successfully."
            }

            cleanup_housekeeping() {
              KEEP_BACKUPS=1

              echo "Starting deployment housekeeping cleanup..."

              # Keep only the most recent backup directories and remove older ones.
              OLD_BACKUPS="$(ls -1dt /home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.backup-* 2>/dev/null | tail -n +$((KEEP_BACKUPS + 1)) || true)"
              if [ -n "$OLD_BACKUPS" ]; then
                echo "$OLD_BACKUPS" | xargs -r rm -rf
                echo "Old backup directories removed (keeping latest $KEEP_BACKUPS)."
              else
                echo "No old backup directories to remove."
              fi

              # Aggressive cleanup: remove all unused images and builder cache.
              # Running containers are not affected by image/cache prune operations.
              docker image prune -f || true
              docker image prune -a -f || true
              docker builder prune -af || true

              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                if command -v dnf >/dev/null 2>&1; then
                  sudo dnf clean all || true
                  sudo rm -rf /var/cache/dnf/* || true
                fi
                sudo journalctl --vacuum-time=14d || true
              fi

              echo "Housekeeping cleanup completed."
              docker system df || true
            }

            if ! deploy_with_pulled_images; then
              if [ "$ROLLBACK" -eq 1 ] && [ -d "$BACKUP_DIR" ]; then
                echo "Deployment failed. Rolling back application directory..."
                rm -rf "$APP_DIR"
                mv "$BACKUP_DIR" "$APP_DIR"
              fi
              exit 1
            fi

            apply_runtime_limits

            if ! deploy_nginx_config; then
              echo "Backend deploy succeeded but nginx config update failed."
              exit 1
            fi

            cleanup_housekeeping || true

            docker logout ghcr.io || true
            rm -f "$ARCHIVE_PRIMARY" "$ARCHIVE_FALLBACK"

            docker compose --env-file .env -f docker-compose.yml -f docker-compose.level3.yml ps
            curl -fsS http://127.0.0.1:3700/health >/dev/null
            echo "Backend deployment completed successfully."

      - name: Verify public health endpoints
        run: |
          set -Eeuo pipefail
          BASE_URL="${{ env.DEPLOY_PUBLIC_API_BASE_URL }}"
          BASE_URL="${BASE_URL%/}"

          check_endpoint() {
            endpoint="$1"
            for attempt in 1 2 3 4 5; do
              if curl -fsS "$endpoint" >/dev/null; then
                echo "Healthy: $endpoint"
                return 0
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Unhealthy after retries: $endpoint"
                return 1
              fi

              echo "Attempt $attempt failed for $endpoint, retrying in 10 seconds..."
              sleep 10
            done
          }

          check_endpoint "$BASE_URL/health"
          check_endpoint "$BASE_URL/api/v1/health"

          echo "Public health verification passed."
