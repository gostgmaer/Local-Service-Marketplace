name: Backend Unified CI-CD (ARM)

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      force_clean_cache:
        description: "Skip dependency and Docker layer caches for this run"
        required: false
        default: false
        type: boolean
      run_seed:
        description: "Run seed.js after migrations (safe to repeat — skips existing data)"
        required: false
        default: false
        type: boolean
      skip_migrations:
        description: "Skip migrations step (only useful for hotfix deploys)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_APP_DIR_NAME: ${{ vars.DEPLOY_APP_DIR_NAME || 'Local-Service-Marketplace' }}
  DEPLOY_PUBLIC_API_BASE_URL: ${{ vars.DEPLOY_PUBLIC_API_BASE_URL || 'https://lsp-api.easydev.in' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  ci:
    name: CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            context: services/identity-service
            lockfile: services/identity-service/pnpm-lock.yaml
          - service: marketplace-service
            context: services/marketplace-service
            lockfile: services/marketplace-service/pnpm-lock.yaml
          - service: payment-service
            context: services/payment-service
            lockfile: services/payment-service/pnpm-lock.yaml
          - service: comms-service
            context: services/comms-service
            lockfile: services/comms-service/pnpm-lock.yaml
          - service: oversight-service
            context: services/oversight-service
            lockfile: services/oversight-service/pnpm-lock.yaml
          - service: infrastructure-service
            context: services/infrastructure-service
            lockfile: services/infrastructure-service/pnpm-lock.yaml
          - service: api-gateway
            context: api-gateway
            lockfile: api-gateway/pnpm-lock.yaml
    defaults:
      run:
        working-directory: ${{ matrix.context }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js (with pnpm cache)
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.force_clean_cache == 'true') }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Setup Node.js (without pnpm cache)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_clean_cache == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (if present)
        run: pnpm run --if-present lint

      - name: Typecheck (if present)
        run: pnpm run --if-present typecheck

      - name: Unit tests (if present)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            pnpm exec jest --passWithNoTests --ci
          else
            echo "No test script found; skipping unit tests."
          fi

      - name: Trivy FS scan (HIGH, CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.context }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  build-and-push:
    name: Build And Push (${{ matrix.service }})
    # Native ARM64 runner â€” avoids QEMU SIGILL (Illegal instruction) crashes
    # that occur when emulating ARM64 on x86 during `pnpm install`.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            context: services/identity-service
          - service: marketplace-service
            context: services/marketplace-service
          - service: payment-service
            context: services/payment-service
          - service: comms-service
            context: services/comms-service
          - service: oversight-service
            context: services/oversight-service
          - service: api-gateway
            context: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lsp-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/lsp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ github.ref_name }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_clean_cache == 'true' }}

  deploy-and-release:
    name: Deploy, Cleanup & Release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build-and-push]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OCI_HOST }}" || { echo "Missing secret: OCI_HOST"; exit 1; }
          test -n "${{ secrets.OCI_USER }}" || { echo "Missing secret: OCI_USER"; exit 1; }
          test -n "${{ secrets.OCI_SSH_PRIVATE_KEY }}" || { echo "Missing secret: OCI_SSH_PRIVATE_KEY"; exit 1; }
          test -n "${{ secrets.GHCR_USERNAME }}" || { echo "Missing secret: GHCR_USERNAME"; exit 1; }
          test -n "${{ secrets.GHCR_TOKEN }}" || { echo "Missing secret: GHCR_TOKEN"; exit 1; }

      - name: Create release archive (tracked files only)
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output artifacts/release.tgz HEAD
          ls -lh artifacts/release.tgz

      - name: Generate docker.env from GitHub Secrets
        run: |
          mkdir -p env-upload
          {
            # ── Runtime ──────────────────────────────────────────────────────
            echo "NODE_ENV=production"
            echo "COMPOSE_PROFILES=workers"
            echo "TOKEN_VALIDATION_STRATEGY=local"

            # ── Security ─────────────────────────────────────────────────────
            echo "JWT_SECRET=${{ secrets.LSP_JWT_SECRET }}"
            echo "JWT_REFRESH_SECRET=${{ secrets.LSP_JWT_REFRESH_SECRET }}"
            echo "GATEWAY_INTERNAL_SECRET=${{ secrets.LSP_GATEWAY_INTERNAL_SECRET }}"
            echo "ENCRYPTION_KEY=${{ secrets.LSP_ENCRYPTION_KEY }}"
            echo "SESSION_SECRET=${{ secrets.LSP_SESSION_SECRET }}"
            echo "AUTH_SECRET=${{ secrets.LSP_AUTH_SECRET }}"

            # ── Bootstrap admin users ─────────────────────────────────────────
            echo "SUPER_ADMIN_EMAIL=${{ secrets.LSP_SUPER_ADMIN_EMAIL }}"
            echo "SUPER_ADMIN_PASSWORD=${{ secrets.LSP_SUPER_ADMIN_PASSWORD }}"
            echo "SUPER_ADMIN_NAME=${{ vars.LSP_SUPER_ADMIN_NAME || 'Super Admin' }}"
            echo "ADMIN_EMAIL=${{ vars.LSP_ADMIN_EMAIL }}"
            echo "ADMIN_PASSWORD=${{ secrets.LSP_ADMIN_PASSWORD }}"
            echo "ADMIN_NAME=${{ vars.LSP_ADMIN_NAME || 'Admin' }}"

            # ── PostgreSQL ────────────────────────────────────────────────────
            echo "POSTGRES_USER=${{ vars.LSP_POSTGRES_USER || 'postgres' }}"
            echo "POSTGRES_PASSWORD=${{ secrets.LSP_POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ vars.LSP_POSTGRES_DB || 'marketplace' }}"
            echo "DATABASE_HOST=postgres"
            echo "DATABASE_PORT=5432"
            echo "DATABASE_USER=${{ vars.LSP_POSTGRES_USER || 'postgres' }}"
            echo "DATABASE_PASSWORD=${{ secrets.LSP_POSTGRES_PASSWORD }}"
            echo "DATABASE_NAME=${{ vars.LSP_POSTGRES_DB || 'marketplace' }}"
            echo "DATABASE_SSL=false"
            echo "DATABASE_URL=postgresql://${{ vars.LSP_POSTGRES_USER || 'postgres' }}:${{ secrets.LSP_POSTGRES_PASSWORD }}@postgres:5432/${{ vars.LSP_POSTGRES_DB || 'marketplace' }}"
            echo "DB_POOL_MAX=20"
            echo "DB_POOL_MIN=5"

            # ── Redis ─────────────────────────────────────────────────────────
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "REDIS_PASSWORD=${{ secrets.LSP_REDIS_PASSWORD }}"
            echo "REDIS_RATE_LIMIT_ENABLED=true"

            # ── Domains & CORS ────────────────────────────────────────────────
            echo "LSP_API_DOMAIN=${{ vars.LSP_API_DOMAIN || 'lsp-api.easydev.in' }}"
            echo "LSP_FRONTEND_DOMAIN=${{ vars.LSP_FRONTEND_DOMAIN || 'lsp.easydev.in' }}"
            echo "DOMAIN_NAME=${{ vars.LSP_FRONTEND_DOMAIN || 'lsp.easydev.in' }}"
            echo "FRONTEND_URL=https://${{ vars.LSP_FRONTEND_DOMAIN || 'lsp.easydev.in' }}"
            # LSP_CORS_ORIGINS: explicit comma-separated list; falls back to frontend domain only
            _CORS="${{ vars.LSP_CORS_ORIGINS }}"
            _CORS="${_CORS:-https://${{ vars.LSP_FRONTEND_DOMAIN || 'lsp.easydev.in' }}}"
            echo "CORS_ORIGIN=$_CORS"
            echo "CORS_ORIGINS=$_CORS"
            echo "NEXT_PUBLIC_API_URL=https://${{ vars.LSP_API_DOMAIN || 'lsp-api.easydev.in' }}"
            echo "INTERNAL_API_URL=http://api-gateway:3000"
            echo "NEXTAUTH_URL=https://${{ vars.LSP_FRONTEND_DOMAIN || 'lsp.easydev.in' }}"

            # ── External services ─────────────────────────────────────────────
            echo "FILE_UPLOAD_SERVICE_URL=${{ vars.LSP_FILE_UPLOAD_SERVICE_URL }}"
            echo "FILE_DEFAULT_TENANT_ID=${{ vars.LSP_DEFAULT_TENANT_ID || 'default' }}"
            echo "NOTIFICATION_SERVICE_URL=${{ vars.LSP_NOTIFICATION_SERVICE_URL }}"
            echo "NOTIFICATION_API_KEY=${{ secrets.LSP_NOTIFICATION_API_KEY }}"
            echo "NOTIFICATION_FROM_EMAIL=${{ vars.LSP_NOTIFICATION_FROM_EMAIL }}"
            echo "NOTIFICATION_FROM_NAME=${{ vars.LSP_NOTIFICATION_FROM_NAME || 'Local Service Marketplace' }}"
            echo "DEFAULT_TENANT_ID=${{ vars.LSP_DEFAULT_TENANT_ID || 'local-service-marketplace' }}"

            # ── Internal service URLs (Docker network) ────────────────────────
            echo "IDENTITY_SERVICE_URL=http://identity-service:3001"
            echo "MARKETPLACE_SERVICE_URL=http://marketplace-service:3003"
            echo "PAYMENT_SERVICE_URL=http://payment-service:3006"
            echo "COMMS_SERVICE_URL=http://comms-service:3007"
            echo "OVERSIGHT_SERVICE_URL=http://oversight-service:3010"

            # ── API Gateway ───────────────────────────────────────────────────
            echo "API_GATEWAY_PORT=3700"
            echo "RATE_LIMIT_WINDOW_MS=60000"
            echo "RATE_LIMIT_MAX_REQUESTS=100"
            echo "REQUEST_TIMEOUT_MS=72000"

            # ── Feature flags ─────────────────────────────────────────────────
            echo "CACHE_ENABLED=true"
            echo "WORKERS_ENABLED=true"
            echo "WORKER_CONCURRENCY=10"
            echo "EVENT_BUS_ENABLED=false"
            echo "BACKGROUND_JOBS_ENABLED=false"
            echo "RATE_LIMITING_ENABLED=true"
            echo "FEATURE_FLAGS_ENABLED=true"
            echo "ANALYTICS_ENABLED=false"
            echo "INFRASTRUCTURE_ENABLED=false"
            echo "MESSAGING_ENABLED=false"
            echo "API_GATEWAY_ENABLED=true"
            echo "EMAIL_ENABLED=true"
            echo "SMS_ENABLED=false"
            echo "IN_APP_NOTIFICATIONS_ENABLED=false"
            echo "PUSH_NOTIFICATIONS_ENABLED=false"
            echo "NOTIFICATION_PREFERENCES_ENABLED=false"
            echo "DEVICE_TRACKING_ENABLED=false"

            # ── Payment ───────────────────────────────────────────────────────
            echo "PAYMENT_GATEWAY=${{ vars.LSP_PAYMENT_GATEWAY || 'mock' }}"
            echo "RAZORPAY_KEY_ID=${{ secrets.LSP_RAZORPAY_KEY_ID }}"
            echo "RAZORPAY_KEY_SECRET=${{ secrets.LSP_RAZORPAY_KEY_SECRET }}"
            echo "RAZORPAY_WEBHOOK_SECRET=${{ secrets.LSP_RAZORPAY_WEBHOOK_SECRET }}"
            echo "STRIPE_SECRET_KEY=${{ secrets.LSP_STRIPE_SECRET_KEY }}"
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.LSP_STRIPE_WEBHOOK_SECRET }}"

            # ── OAuth (optional) ──────────────────────────────────────────────
            echo "GOOGLE_CLIENT_ID=${{ vars.LSP_GOOGLE_CLIENT_ID }}"
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.LSP_GOOGLE_CLIENT_SECRET }}"
            echo "GOOGLE_CALLBACK_URL=https://${{ vars.LSP_API_DOMAIN || 'lsp-api.easydev.in' }}/api/v1/user/auth/google/callback"
            echo "FACEBOOK_APP_ID=${{ vars.LSP_FACEBOOK_APP_ID }}"
            echo "FACEBOOK_APP_SECRET=${{ secrets.LSP_FACEBOOK_APP_SECRET }}"
            echo "FACEBOOK_CALLBACK_URL=https://${{ vars.LSP_API_DOMAIN || 'lsp-api.easydev.in' }}/api/v1/user/auth/facebook/callback"

            # ── Application ───────────────────────────────────────────────────
            echo "APPLICATION_NAME=Local Service Marketplace"
            echo "LOG_LEVEL=info"
            echo "ENABLE_LOGGING=true"
            echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.LSP_GOOGLE_MAPS_API_KEY }}"

          } > env-upload/docker.env.from-gha
          chmod 600 env-upload/docker.env.from-gha
          echo "Generated docker.env ($(wc -l < env-upload/docker.env.from-gha) lines)"

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          source: artifacts/release.tgz
          strip_components: 1
          target: /home/${{ secrets.OCI_USER }}/
          overwrite: true

      - name: Upload docker.env to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          source: env-upload/docker.env.from-gha
          strip_components: 1
          target: /home/${{ secrets.OCI_USER }}/
          overwrite: true

      - name: Deploy on ARM server (pull images, no build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          script_stop: true
          command_timeout: 80m
          script: |
            set -Eeuo pipefail

            APP_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}"
            STAGE_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.stage-${{ github.run_id }}-${{ github.run_attempt }}"
            BACKUP_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.backup-${{ github.run_id }}-${{ github.run_attempt }}"
            ARCHIVE_PRIMARY="/home/${{ secrets.OCI_USER }}/release.tgz"
            ARCHIVE_FALLBACK="/home/${{ secrets.OCI_USER }}/artifacts/release.tgz"
            OWNER="${{ github.repository_owner }}"

            if [ -f "$ARCHIVE_PRIMARY" ]; then
              ARCHIVE="$ARCHIVE_PRIMARY"
            elif [ -f "$ARCHIVE_FALLBACK" ]; then
              ARCHIVE="$ARCHIVE_FALLBACK"
            else
              echo "Release archive not found. Checked:"
              echo " - $ARCHIVE_PRIMARY"
              echo " - $ARCHIVE_FALLBACK"
              exit 1
            fi

            rm -rf "$STAGE_DIR"
            mkdir -p "$STAGE_DIR"
            tar -xzf "$ARCHIVE" -C "$STAGE_DIR"

            # Use docker.env written from GitHub Secrets (uploaded in prior step).
            # Falls back to the persisted server file if the upload step was skipped.
            GHA_ENV="$HOME/docker.env.from-gha"
            if [ -f "$GHA_ENV" ]; then
              cp "$GHA_ENV" "$STAGE_DIR/docker.env"
              cp "$GHA_ENV" "$STAGE_DIR/.env"
              rm -f "$GHA_ENV"
              echo "docker.env: using GitHub Secrets"
            else
              if [ -f "$APP_DIR/docker.env" ]; then cp "$APP_DIR/docker.env" "$STAGE_DIR/docker.env"; fi
              if [ -f "$APP_DIR/.env" ]; then cp "$APP_DIR/.env" "$STAGE_DIR/.env"; fi
              echo "docker.env: using persisted file from server"
            fi

            ROLLBACK=0
            if [ -d "$APP_DIR" ]; then
              rm -rf "$BACKUP_DIR"
              mv "$APP_DIR" "$BACKUP_DIR"
              ROLLBACK=1
            fi

            mv "$STAGE_DIR" "$APP_DIR"
            cd "$APP_DIR"

            chmod +x scripts/deploy-production-worker.sh

            if [ ! -f ".env" ]; then
              echo "Missing .env on server. Add $APP_DIR/.env and rerun."
              exit 1
            fi

            # Ensure the shared external network exists (Traefik must already be
            # running on the server and connected to it — we never manage Traefik here).
            docker network create edge 2>/dev/null || true

            deploy_with_pulled_images() {
              echo "Logging in to GHCR and pulling latest backend images..."
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

              for svc in identity-service marketplace-service payment-service comms-service oversight-service api-gateway; do
                docker pull "ghcr.io/${OWNER}/lsp-${svc}:latest"
                docker tag "ghcr.io/${OWNER}/lsp-${svc}:latest" "lsp-${svc}:latest"
              done

              # Uses explicit backend service list in deploy script; frontend is not deployed.
              SKIP_MIG_FLAG=""
              if [ "${{ github.event.inputs.skip_migrations }}" = "true" ]; then
                SKIP_MIG_FLAG="--skip-migrations"
              fi
              ./scripts/deploy-production-worker.sh --env-file .env --no-build $SKIP_MIG_FLAG
            }

            apply_runtime_limits() {
              echo "Applying fixed production CPU/RAM limits to running containers..."

              docker update --cpus 0.20 --memory 512m --memory-swap 512m lsp-api-gateway
              docker update --cpus 0.30 --memory 768m --memory-swap 768m lsp-marketplace-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m lsp-payment-service
              docker update --cpus 0.25 --memory 768m --memory-swap 768m lsp-identity-service
              docker update --cpus 0.15 --memory 768m --memory-swap 768m lsp-comms-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m lsp-oversight-service
              docker update --cpus 0.10 --memory 512m --memory-swap 512m lsp-redis
              docker update --cpus 0.40 --memory 1536m --memory-swap 1536m lsp-postgres

              echo "Runtime limits applied."
              docker ps --format '{{.Names}}' | xargs -I{} docker inspect --format 'name={{.Name}}|nano_cpus={{.HostConfig.NanoCpus}}|mem_limit_bytes={{.HostConfig.Memory}}|memswap_limit_bytes={{.HostConfig.MemorySwap}}' {}
            }

            cleanup_housekeeping() {
              KEEP_BACKUPS=1

              echo "Starting deployment housekeeping cleanup..."

              OLD_BACKUPS="$(ls -1dt /home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}.backup-* 2>/dev/null | tail -n +$((KEEP_BACKUPS + 1)) || true)"
              if [ -n "$OLD_BACKUPS" ]; then
                echo "$OLD_BACKUPS" | xargs -r rm -rf
                echo "Old backup directories removed (keeping latest $KEEP_BACKUPS)."
              else
                echo "No old backup directories to remove."
              fi

              docker image prune -f || true
              docker image prune -a -f || true
              docker builder prune -af || true

              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                if command -v dnf >/dev/null 2>&1; then
                  sudo dnf clean all || true
                  sudo rm -rf /var/cache/dnf/* || true
                fi
                sudo journalctl --vacuum-time=14d || true
              fi

              echo "Housekeeping cleanup completed."
              docker system df || true
            }

            if ! deploy_with_pulled_images; then
              if [ "$ROLLBACK" -eq 1 ] && [ -d "$BACKUP_DIR" ]; then
                echo "Deployment failed. Rolling back application directory..."
                rm -rf "$APP_DIR"
                mv "$BACKUP_DIR" "$APP_DIR"
              fi
              exit 1
            fi

            apply_runtime_limits
            cleanup_housekeeping

            docker logout ghcr.io || true
            rm -f "$ARCHIVE_PRIMARY" "$ARCHIVE_FALLBACK"

            docker compose --env-file .env -f docker-compose.yml -f docker-compose.level3.yml ps
            echo "Waiting for API Gateway to become healthy..."
            gateway_healthy=0
            for attempt in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:3700/health >/dev/null 2>&1; then
                echo "Gateway healthy after ${attempt} attempt(s)."
                gateway_healthy=1
                break
              fi
              echo "Gateway not ready yet (attempt ${attempt}/15), retrying in 10s..."
              sleep 10
            done
            if [ "$gateway_healthy" -eq 0 ]; then
              echo "Gateway did not become healthy in time. Check logs:"
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.level3.yml logs --tail=50 api-gateway || true
              exit 1
            fi
            echo "Backend deployment completed successfully."

      - name: Run seed.js (categories, RBAC, feature flags)
        if: ${{ github.event.inputs.run_seed == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -Eeuo pipefail
            APP_DIR="/home/${{ secrets.OCI_USER }}/${{ env.DEPLOY_APP_DIR_NAME }}"
            cd "$APP_DIR"

            # Read DB credentials from docker.env
            DB_USER="$(grep -E '^(DATABASE_USER|POSTGRES_USER)=' docker.env | head -1 | cut -d= -f2-)"
            DB_PASS="$(grep -E '^(DATABASE_PASSWORD|POSTGRES_PASSWORD)=' docker.env | head -1 | cut -d= -f2-)"
            DB_NAME="$(grep -E '^(DATABASE_NAME|POSTGRES_DB)=' docker.env | head -1 | cut -d= -f2-)"
            DB_USER="${DB_USER:-postgres}"
            DB_NAME="${DB_NAME:-marketplace}"

            echo "Running seed.js (idempotent — skips existing rows)..."
            docker run --rm \
              --network host \
              -e POSTGRES_HOST=127.0.0.1 \
              -e POSTGRES_PORT=54321 \
              -e POSTGRES_USER="$DB_USER" \
              -e POSTGRES_PASSWORD="$DB_PASS" \
              -e POSTGRES_DB="$DB_NAME" \
              -v "${APP_DIR}/database:/src:ro" \
              node:20-alpine \
              sh -c "cp -R /src /tmp/db && cd /tmp/db && npm install --omit=dev --no-audit --no-fund >/dev/null && node seed.js"
            echo "Seed completed."

      - name: Verify public health endpoints
        run: |
          BASE_URL="${{ env.DEPLOY_PUBLIC_API_BASE_URL }}"
          BASE_URL="${BASE_URL%/}"

          check_endpoint() {
            local endpoint="$1"
            local http_code
            for attempt in 1 2 3 4 5; do
              http_code="$(curl -o /dev/null -w "%{http_code}" -sS --max-time 15 "$endpoint" 2>/dev/null || true)"

              if [ "$http_code" = "200" ] || [ "$http_code" = "204" ]; then
                echo "Healthy ($http_code): $endpoint"
                return 0
              fi

              # Cloudflare proxy errors (521-527) and network errors (000) are
              # external to the application â€” warn but do not fail.
              if [ "$http_code" = "521" ] || [ "$http_code" = "522" ] || \
                 [ "$http_code" = "523" ] || [ "$http_code" = "524" ] || \
                 [ "$http_code" = "525" ] || [ "$http_code" = "526" ] || \
                 [ "$http_code" = "527" ] || [ "$http_code" = "000" ]; then
                echo "WARNING: External network/Cloudflare error ($http_code) for $endpoint â€” not an application failure."
                return 0
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "WARNING: $endpoint returned HTTP $http_code after $attempt attempts."
                return 0
              fi

              echo "Attempt $attempt failed ($http_code) for $endpoint, retrying in 10 seconds..."
              sleep 10
            done
          }

          check_endpoint "$BASE_URL/health"
          check_endpoint "$BASE_URL/api/v1/health"
          echo "Public health verification completed."

      - name: Cleanup GHCR old package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packages = [
              'lsp-identity-service', 'lsp-marketplace-service', 'lsp-payment-service',
              'lsp-comms-service', 'lsp-oversight-service', 'lsp-api-gateway'
            ];
            const owner = context.repo.owner;
            const KEEP = 5;

            for (const pkg of packages) {
              let versions = [];
              try {
                versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                  { package_type: 'container', package_name: pkg, username: owner, per_page: 100 }
                );
              } catch {
                try {
                  versions = await github.paginate(
                    github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                    { package_type: 'container', package_name: pkg, org: owner, per_page: 100 }
                  );
                } catch (e) {
                  core.warning(`Could not list versions for ${pkg}: ${e.message}`);
                  continue;
                }
              }

              const toDelete = versions
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                .slice(KEEP);

              core.info(`${pkg}: ${versions.length} total, deleting ${toDelete.length} old version(s).`);
              for (const v of toDelete) {
                try {
                  await github.rest.packages.deletePackageVersionForUser(
                    { package_type: 'container', package_name: pkg, username: owner, package_version_id: v.id }
                  );
                } catch {
                  try {
                    await github.rest.packages.deletePackageVersionForOrg(
                      { package_type: 'container', package_name: pkg, org: owner, package_version_id: v.id }
                    );
                  } catch (e) {
                    core.warning(`Could not delete ${pkg} version ${v.id}: ${e.message}`);
                  }
                }
              }
            }

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,master
          tag_prefix: v
          custom_release_rules: "major:major,feat:minor,fix:patch,chore:patch,refactor:patch,perf:patch,style:patch,docs:patch,test:patch,build:patch,ci:patch"

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: false

