# GitHub Actions workflow to trigger Copilot review on every PR
# Place this file in .github/workflows/copilot-pr-review.yml

name: Copilot PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review via API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // Try common reviewer slugs and stop on first success.
            const reviewerCandidates = [
              'copilot',
              'github-copilot[bot]',
              'Copilot'
            ];

            let requested = false;
            for (const reviewer of reviewerCandidates) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number,
                  reviewers: [reviewer]
                });
                core.info(`Requested review from ${reviewer}`);
                requested = true;
                break;
              } catch (error) {
                core.warning(`Could not request reviewer '${reviewer}': ${error.message}`);
              }
            }

            if (!requested) {
              core.notice('Could not request Copilot via API. Enable automatic Copilot reviews in repository settings if needed.');
            }
