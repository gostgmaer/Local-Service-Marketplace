name: PR Check & Preview Deploy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend:
    name: "Frontend - Lint / Build / Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm lint

      - name: Test
        run: pnpm test --passWithNoTests --ci

      - name: Build
        run: pnpm build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3700

  backend:
    name: "Backend - Build (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - marketplace-service
          - payment-service
          - comms-service
          - oversight-service
          - infrastructure-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm run --if-present lint

      - name: Test
        run: pnpm test --passWithNoTests --ci
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build

  api-gateway:
    name: "API Gateway - Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: api-gateway/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm run --if-present lint

      - name: Test
        run: pnpm test --passWithNoTests --ci
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build