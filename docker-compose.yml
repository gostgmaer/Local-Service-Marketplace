        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
    build:
