  infrastructure-service:
    build:
      context: ./services/infrastructure-service
      dockerfile: Dockerfile
    container_name: infrastructure-service
    restart: unless-stopped
    ports:
      - "3012:3012"
    environment:
      - NODE_ENV=production
      - PORT=3012
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/marketplace
