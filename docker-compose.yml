  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - REQUEST_SERVICE_URL=http://request-service:3003
      - PROPOSAL_SERVICE_URL=http://proposal-service:3004
      - JOB_SERVICE_URL=http://job-service:3005
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - MESSAGING_SERVICE_URL=http://messaging-service:3007
      - NOTIFICATION_SERVICE_URL=http://notification-service:3008
      - REVIEW_SERVICE_URL=http://review-service:3009
      - ADMIN_SERVICE_URL=http://admin-service:3010
      - ANALYTICS_SERVICE_URL=http://analytics-service:3011
      - INFRASTRUCTURE_SERVICE_URL=http://infrastructure-service:3012
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      proposal-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      infrastructure-service:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    build:
      context: ./frontend/nextjs-app
      dockerfile: Dockerfile
    container_name: marketplace-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  marketplace-network:
    driver: bridge
