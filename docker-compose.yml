      - ADMIN_SERVICE_URL=http://oversight-service:3010
      - ANALYTICS_SERVICE_URL=http://oversight-service:3010
      - INFRASTRUCTURE_SERVICE_URL=http://infrastructure-service:3012
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      # Redis rate limiting (optional Ă˘â‚¬â€ť only needed with multiple gateway replicas)
      - REDIS_RATE_LIMIT_ENABLED=${REDIS_RATE_LIMIT_ENABLED:-false}
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Feature Flags for Optional Services
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-false}
      - INFRASTRUCTURE_ENABLED=${INFRASTRUCTURE_ENABLED:-false}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-72000}
    depends_on:
      identity-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      comms-service:
        condition: service_healthy
      oversight-service:
        condition: service_healthy
      # Optional services (infrastructure) removed from depends_on
      # They will start independently if their profiles are enabled
    networks:
      - marketplace-network
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '${CPU_GATEWAY:-0.25}'
          memory: ${MEM_SERVICE:-256M}
        reservations:
          memory: 64M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.lsp-api.rule=Host(`${LSP_API_DOMAIN:-lsp-api.easydev.in}`)"
      - "traefik.http.routers.lsp-api.entrypoints=websecure"
      - "traefik.http.routers.lsp-api.tls=true"
      - "traefik.http.routers.lsp-api.tls.certresolver=le"
      - "traefik.http.routers.lsp-api.middlewares=security-headers@file"
      - "traefik.http.services.lsp-api.loadbalancer.server.port=3000"


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local


networks:
  marketplace-network:
    driver: bridge
  edge:
    external: true
    name: edge


