ď»żservices:
  # Database
  postgres:
    image: postgres:17-alpine
    container_name: lsp-postgres
    restart: unless-stopped
    profiles:
      - infra
      - cache
      - event
      - events
      - full
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
      POSTGRES_DB: marketplace
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '${CPU_DB:-0.5}'
          memory: ${MEM_DB:-384M}
        reservations:
          memory: 128M

  # NOTE: MongoDB not needed - file-upload-service is external
  
  redis:
    image: redis:7-alpine
    container_name: lsp-redis
    restart: unless-stopped
    profiles:
      - scaling
      - cache
      - workers
      - event
      - events
      - full
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-}
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '${CPU_REDIS:-0.05}'
          memory: ${MEM_REDIS:-64M}
        reservations:
          memory: 32M

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lsp-zookeeper
    restart: unless-stopped
    profiles:
      - scaling
      - event
      - events
      - full
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - marketplace-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lsp-kafka
    restart: unless-stopped
    profiles:
      - scaling
      - event
      - events
      - full
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # One-shot container that creates all required Kafka topics before services start.
  # Exits with code 0 once topics are created (idempotent Ă˘â‚¬â€ť already-exists is not an error).
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lsp-kafka-init
    profiles:
      - scaling
      - event
      - events
      - full
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - marketplace-network
    # topic format: <name>:<partitions>:<replication-factor>
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        kafka-topics --bootstrap-server kafka:29092 --list &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic request_created --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic proposal_submitted --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic job_started --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic job_completed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment_completed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic review_submitted --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification_created --partitions 3 --replication-factor 1 &&
        echo 'All Kafka topics created successfully.'
      "

  # Microservices
  # identity-service: auth + user merged
  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    image: lsp-identity-service:latest
    container_name: lsp-identity-service
    restart: unless-stopped
    profiles:
      - full
    env_file:
      - docker.env
    # ports deliberately omitted Ă˘â‚¬â€ť only reachable via api-gateway on internal network
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Kolkata
      - PORT=3001
      - SERVICE_NAME=identity-service
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRATION=90d
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3700/api/v1/user/auth/google/callback}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - FACEBOOK_CALLBACK_URL=${FACEBOOK_CALLBACK_URL:-http://localhost:3700/api/v1/user/auth/facebook/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - WORKERS_ENABLED=${WORKERS_ENABLED:-false}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL:-http://localhost:4100}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-default}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-72000}
    networks:
      - marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '${CPU_IDENTITY:-0.15}'
          memory: ${MEM_SERVICE:-256M}
        reservations:
          memory: 64M

