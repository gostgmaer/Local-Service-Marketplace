      context: ./services/request-service
      dockerfile: Dockerfile
    container_name: request-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/marketplace
      - REDIS_URL=redis://redis:6379
