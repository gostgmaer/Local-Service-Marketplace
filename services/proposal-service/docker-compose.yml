version: '3.8'

services:
  proposal-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proposal-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=proposal_service_db
      - DATABASE_USER=proposal_service_user
      - DATABASE_PASSWORD=proposal_service_password
    depends_on:
      - postgres
    networks:
      - proposal-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: proposal-postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=proposal_service_db
      - POSTGRES_USER=proposal_service_user
      - POSTGRES_PASSWORD=proposal_service_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - proposal-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  proposal-network:
    driver: bridge
