version: '3.8'

services:
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3010:3010'
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_HOST=admin-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=admin_service_db
      - DATABASE_USER=admin_service_user
      - DATABASE_PASSWORD=admin_service_password
    depends_on:
      - admin-db
    networks:
      - admin-network

  admin-db:
    image: postgres:16-alpine
    ports:
      - '5441:5432'
    environment:
      - POSTGRES_DB=admin_service_db
      - POSTGRES_USER=admin_service_user
      - POSTGRES_PASSWORD=admin_service_password
    volumes:
      - admin-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - admin-network

volumes:
  admin-db-data:

networks:
  admin-network:
    driver: bridge
