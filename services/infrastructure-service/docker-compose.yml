version: '3.8'

services:
  infrastructure-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infrastructure-service
    ports:
      - '3012:3012'
    environment:
      NODE_ENV: production
      PORT: 3012
      DATABASE_HOST: infrastructure-db
      DATABASE_PORT: 5432
      DATABASE_USER: infrastructure_user
      DATABASE_PASSWORD: infrastructure_password
      DATABASE_NAME: infrastructure_service_db
      REDIS_HOST: infrastructure-redis
      REDIS_PORT: 6379
    depends_on:
      - infrastructure-db
      - infrastructure-redis
    networks:
      - infrastructure-network
    restart: unless-stopped

  infrastructure-db:
    image: postgres:15-alpine
    container_name: infrastructure-db
    ports:
      - '5443:5432'
    environment:
      POSTGRES_USER: infrastructure_user
      POSTGRES_PASSWORD: infrastructure_password
      POSTGRES_DB: infrastructure_service_db
    volumes:
      - infrastructure-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - infrastructure-network
    restart: unless-stopped

  infrastructure-redis:
    image: redis:7-alpine
    container_name: infrastructure-redis
    ports:
      - '6379:6379'
    volumes:
      - infrastructure-redis-data:/data
    networks:
      - infrastructure-network
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  infrastructure-db-data:
  infrastructure-redis-data:

networks:
  infrastructure-network:
    driver: bridge
