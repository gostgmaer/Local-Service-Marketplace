version: '3.8'

services:
  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - '3011:3011'
    environment:
      NODE_ENV: production
      PORT: 3011
      DATABASE_HOST: analytics-db
      DATABASE_PORT: 5432
      DATABASE_USER: analytics_user
      DATABASE_PASSWORD: analytics_password
      DATABASE_NAME: analytics_service_db
    depends_on:
      - analytics-db
    networks:
      - analytics-network
    restart: unless-stopped

  analytics-db:
    image: postgres:15-alpine
    container_name: analytics-db
    ports:
      - '5442:5432'
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics_service_db
    volumes:
      - analytics-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - analytics-network
    restart: unless-stopped

volumes:
  analytics-db-data:

networks:
  analytics-network:
    driver: bridge
