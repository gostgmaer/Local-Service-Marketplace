version: '3.8'

services:
  request-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: request-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=request_service_db
      - DATABASE_USER=request_service_user
      - DATABASE_PASSWORD=request_service_password
    depends_on:
      - postgres
    networks:
      - request-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: request-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=request_service_db
      - POSTGRES_USER=request_service_user
      - POSTGRES_PASSWORD=request_service_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - request-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  request-network:
    driver: bridge
