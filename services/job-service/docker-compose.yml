version: '3.8'

services:
  job-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=job_service_db
      - DATABASE_USER=job_service_user
      - DATABASE_PASSWORD=job_service_password
    depends_on:
      - postgres
    networks:
      - job-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: job-postgres
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_DB=job_service_db
      - POSTGRES_USER=job_service_user
      - POSTGRES_PASSWORD=job_service_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - job-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  job-network:
    driver: bridge
