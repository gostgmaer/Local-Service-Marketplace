version: '3.8'

services:
  messaging-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3007:3007'
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_HOST=messaging-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=messaging_service_db
      - DATABASE_USER=messaging_service_user
      - DATABASE_PASSWORD=messaging_service_password
    depends_on:
      - messaging-db
    networks:
      - messaging-network

  messaging-db:
    image: postgres:16-alpine
    ports:
      - '5438:5432'
    environment:
      - POSTGRES_DB=messaging_service_db
      - POSTGRES_USER=messaging_service_user
      - POSTGRES_PASSWORD=messaging_service_password
    volumes:
      - messaging-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - messaging-network

volumes:
  messaging-db-data:

networks:
  messaging-network:
    driver: bridge
