version: '3.8'

services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3006:3006'
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_HOST=payment-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=payment_service_db
      - DATABASE_USER=payment_service_user
      - DATABASE_PASSWORD=payment_service_password
    depends_on:
      - payment-db
    networks:
      - payment-network

  payment-db:
    image: postgres:16-alpine
    ports:
      - '5437:5432'
    environment:
      - POSTGRES_DB=payment_service_db
      - POSTGRES_USER=payment_service_user
      - POSTGRES_PASSWORD=payment_service_password
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - payment-network

volumes:
  payment-db-data:

networks:
  payment-network:
    driver: bridge
