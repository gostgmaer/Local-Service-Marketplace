version: '3.8'

services:
  review-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3009:3009'
    environment:
      - NODE_ENV=production
      - PORT=3009
      - DATABASE_HOST=review-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=review_service_db
      - DATABASE_USER=review_service_user
      - DATABASE_PASSWORD=review_service_password
    depends_on:
      - review-db
    networks:
      - review-network

  review-db:
    image: postgres:16-alpine
    ports:
      - '5440:5432'
    environment:
      - POSTGRES_DB=review_service_db
      - POSTGRES_USER=review_service_user
      - POSTGRES_PASSWORD=review_service_password
    volumes:
      - review-db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - review-network

volumes:
  review-db-data:

networks:
  review-network:
    driver: bridge
