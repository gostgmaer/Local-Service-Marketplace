version: '3.9'

services:
  sms-service:
    build: .
    image: sms-delivery-service:latest
    container_name: sms-delivery-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/sms-delivery-service
      REDIS_URL: redis://redis:6379
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      API_KEY: ${API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7
    container_name: sms-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - sms-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - sms-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mongo_data:
  redis_data:

networks:
  sms-net:
    driver: bridge
