input {
  gelf {
    port => 12201
    type => "docker"
  }
}

filter {
  # Extract service name from Docker tag
  if [tag] {
    mutate {
      add_field => { "service_name" => "%{tag}" }
    }
  }

  # Parse JSON log messages from NestJS/Winston
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }

    if [parsed][timestamp] {
      mutate {
        add_field => { "log_timestamp" => "%{[parsed][timestamp]}" }
      }
    }

    if [parsed][context] {
      mutate {
        add_field => { "log_context" => "%{[parsed][context]}" }
      }
    }

    if [parsed][level] {
      mutate {
        add_field => { "log_level" => "%{[parsed][level]}" }
      }
    }
  }

  # Extract request ID for correlation
  if [message] =~ /x-request-id/ or [message] =~ /requestId/ {
    grok {
      match => { "message" => "(?:x-request-id|requestId)[\":\s]+(?<request_id>[a-f0-9\-]{36})" }
      tag_on_failure => []
    }
  }

  # Redact sensitive data in logs
  mutate {
    gsub => [
      "message", "\"(password|token|secret|api_key|refreshToken|accessToken|access_token|refresh_token)\"\s*:\s*\"[^\"]*\"", '"\1":"[REDACTED]"',
      "message", "Bearer\s+[A-Za-z0-9\-_\.]+", "Bearer [REDACTED]"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "marketplace-logs-%{+YYYY.MM.dd}"
  }
}
