# =============================================================================
# OWASP ZAP Security Scan Configuration
# =============================================================================
# Run against a staging environment:
#
#   docker run --rm -v $(pwd):/zap/wrk:rw \
#     -t ghcr.io/zaproxy/zaproxy:stable \
#     zap-baseline.py -t http://staging.marketplace.com:3700 \
#     -c zap-config.conf -J zap-report.json -r zap-report.html
#
# For full scan (slower, more thorough):
#   zap-full-scan.py -t http://staging.marketplace.com:3700 \
#     -c zap-config.conf -J zap-report.json -r zap-report.html
# =============================================================================

# --- Global Settings ---
# Maximum scan duration in minutes (0 = unlimited)
10001	=	60

# --- Target URLs to scan ---
